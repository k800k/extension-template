name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run conformance
      - run: npm run check
      - run: npm test
      - name: Build or sign repository
        env:
          PUBLISHER_KEY: ${{ secrets.MANGAREADER_PUBLISHER_PRIVATE_KEY }}
        shell: bash
        run: |
          if node -e 'const c=require("./repository.config.json");process.exit(c.templateMode?0:1)'; then
            npm run bundle
          else
            test -n "$PUBLISHER_KEY" || { echo "Configure MANGAREADER_PUBLISHER_PRIVATE_KEY after running npm run setup"; exit 1; }
            key_path="$RUNNER_TEMP/publisher-key.pem"
            printf '%s' "$PUBLISHER_KEY" > "$key_path"
            chmod 600 "$key_path"
            npm run publish -- --key "$key_path"
          fi
      - uses: actions/configure-pages@v5
      - name: Assemble Pages artifact
        run: |
          mkdir _site
          cp -R site/. _site/
          cp -R dist _site/dist
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
